version: '3.8'

services:

  kafka:
    image: apache/kafka:latest
    container_name: urbanflow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - urbanflow

  tracking-service:
    build: ./tracking-service
    container_name: urbanflow-tracking
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      KAFKA_BROKERS: kafka:9092
    volumes:
      - tracking-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - urbanflow

  prediction-service:
    build: ./prediction-service
    container_name: urbanflow-prediction
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      TRACKING_SERVICE_URL: http://tracking-service:3001
      KAFKA_BROKERS: kafka:9092
    volumes:
      - prediction-data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
      tracking-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - urbanflow

volumes:
  tracking-data:
  prediction-data:

networks:
  urbanflow:
    driver: bridge
